[tool.uv.workspace]
members = [
    "api",
    "chroma",
    "claude",
    "core",
    "huggingface",
    "lancedb",
    "langchain",
    "litellm",
    "llm-agent",
    "marvin",
    "mcp",
    "playwright",
    "ray",
    "redis",
    "serpapi",
    "showcase",
    "skills",
    "testing",
    "vertexai"
]

[dependency-groups]
dev = [
    "pytest>=8.3.4",
    "black[jupyter]>=24.2.0",
    "flake8>=7.1.2",
    "tox>=4.24.1",
    "isort>=6.0.0",
    "mypy>=1.15.0",
    "coverage>=7.6.12",
    "cookiecutter>=2.6.0",
    "tomlkit>=0.13.2",
    "fakeredis>=2.27.0",
    "pytest-asyncio>=0.25.3",
    "httpx>=0.28.1",
    "flaky>=3.8.1",
    "pytest-xdist>=3.6.1",
    "rusticai-testing",
]
docs = [
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.6.14",
    "mdx-truly-sane-lists>=1.3",
    "mkdocstrings>=0.30.0",
    "mkdocstrings-python>=1.18.2",
    "pydoc-markdown>=4.8.2",
]

[tool.uv.sources]
rusticai-testing = { workspace = true }

[tool.black]
line-length = 120
target-version = ['py313']
include = '\\.pyi?$'
exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  |__pycache__
  | resources/*
)/
'''

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
check_untyped_defs = true
plugins = "pydantic.mypy"
explicit_package_bases = true
exclude = [
    "^\\.venv/",
    "^\\dist/",
    "^\\.tox/",
    "^cache/",
    "cookiecutter-rustic/",
    "out/",
    "conftest.py",
]

[tool.isort]
profile = "black"
force_sort_within_sections = true # For the sorting order issues
lines_between_sections = 1 # For the newline issue
known_third_party = [
    "pydantic",
    "fastapi",
    "starlette",
    "uvicorn",
    "ray",
    "dotenv",
    "openai",
    "litellm",
    "pytest",
    "ray",
    "playwright",
    "redis",
    "serpapi",
    "marvin",
    "vertexai",
]
known_first_party = ["rustic_ai"]
known_local_folder = ["core", "rustic_ai.testing"]


[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
norecursedirs = ["cookiecutter-rustic"]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
