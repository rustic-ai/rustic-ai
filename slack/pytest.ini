[pytest]
# Pytest configuration for Slack module

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:logfire

# Markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may require external services)
    requires_tokens: Tests that require Slack API tokens
    asyncio: Async tests

# Async support
asyncio_mode = auto

# Coverage (optional)
# addopts = --cov=rustic_ai.slack --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Ignore
norecursedirs = .git .tox dist build *.egg __pycache__ .pytest_cache
